<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wekelijkse Muziek Aanrader - Team Funqtion</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Animated background particles */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(246, 135, 18, 0.3);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
    }

    /* Navigation */
    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      padding: 15px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(246, 135, 18, 0.3);
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 25px;
      margin: 5px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    nav a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(246, 135, 18, 0.4), transparent);
      transition: left 0.5s;
    }

    nav a:hover::before {
      left: 100%;
    }

    nav a:hover {
      background: rgba(246, 135, 18, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(246, 135, 18, 0.3);
    }

    /* Header */
    header {
      background: linear-gradient(135deg, rgba(246, 135, 18, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
      color: #ffffff;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(246, 135, 18, 0.1), transparent);
      animation: rotate 20s linear infinite;
      z-index: -1;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .header-title {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      background: linear-gradient(45deg, #f68712, #ff6b35, #f68712);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease-in-out infinite;
    }

    .header-subtitle {
      font-size: 1.2rem;
      opacity: 0.8;
      font-weight: 300;
      margin-top: 1rem;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Main content */
    main.content {
      padding: 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .recommendations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .spotify-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(246, 135, 18, 0.3);
      border-radius: 20px;
      padding: 0;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      height: 152px;
    }

    .spotify-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f68712, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .spotify-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 
        0 20px 40px rgba(246, 135, 18, 0.2),
        0 8px 32px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: rgba(246, 135, 18, 0.6);
    }

    .spotify-card:hover::before {
      opacity: 1;
    }

    .spotify-card iframe {
      width: 100%;
      height: 152px;
      border: none;
      border-radius: 20px;
      background: transparent;
    }

    /* Enhanced features section */
    .features-section {
      margin: 4rem 0;
      text-align: center;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: rgba(246, 135, 18, 0.1);
      border-color: rgba(246, 135, 18, 0.5);
      transform: translateY(-5px);
    }

    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #f68712;
    }

    /* Footer */
    footer {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      color: #aaa;
      padding: 2rem;
      text-align: center;
      border-top: 1px solid rgba(246, 135, 18, 0.3);
      margin-top: 4rem;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #ccc;
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-links a:hover {
      color: #f68712;
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .recommendations-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      
      header {
        padding: 2rem 1rem;
      }
      
      main.content {
        padding: 2rem 1rem;
      }
      
      .spotify-card {
        height: 152px;
      }
    }

    /* Loading animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading {
      animation: pulse 2s infinite;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(246, 135, 18, 0.3);
      z-index: 1000;
    }

    .scroll-progress {
      height: 100%;
      background: linear-gradient(90deg, #f68712, #ff6b35);
      width: 0%;
      transition: width 0.1s;
    }
  </style>
</head>
<body>
  <!-- Scroll indicator -->

  </div>

  <!-- Background animation -->
  <div class="bg-animation" id="bgAnimation"></div>

  <nav>
    <a href="../index.html">Home</a>

  <script>
    // Scroll progress indicator
    window.addEventListener('scroll', () => {
      const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('scrollProgress').style.width = scrolled + '%';
    });

    // Background particles animation
    function createParticles() {
      const bgAnimation = document.getElementById('bgAnimation');
      const particleCount = 50;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
        bgAnimation.appendChild(particle);
      }
    }

    // Enhanced hover effects for Spotify cards
    document.querySelectorAll('.spotify-card').forEach(card => {
      card.addEventListener('mouseenter', function() {
        this.style.background = 'rgba(246, 135, 18, 0.1)';
      });
      
      card.addEventListener('mouseleave', function() {
        this.style.background = 'rgba(255, 255, 255, 0.05)';
      });
    });

    // Smooth scroll behavior for navigation
    document.querySelectorAll('nav a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // Initialize particles when page loads
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      
      // Add loading animation to iframes
      document.querySelectorAll('iframe').forEach(iframe => {
        iframe.classList.add('loading');
        iframe.addEventListener('load', function() {
          this.classList.remove('loading');
        });
      });
    });

    // Add intersection observer for animations
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
        }
      });
    }, observerOptions);

    // Observe all cards for scroll animations
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.spotify-card, .feature-card').forEach(card => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        card.style.transition = 'all 0.6s ease';
        observer.observe(card);
      });
    });
  </script>
</body>
