<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Funqtion</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: 
        radial-gradient(circle at 20% 50%, rgba(246, 135, 18, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(246, 135, 18, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(246, 135, 18, 0.06) 0%, transparent 50%),
        linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 70%, #0f1419 100%);
      background-attachment: fixed;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Background video styling */
    video.bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100vw;
      min-height: 100vh;
      width: auto;
      height: auto;
      object-fit: cover;
      z-index: -2;
      opacity: 0.3;
      transition: opacity 1s ease-in-out;
    }

    .hide-video {
      opacity: 0 !important;
    }

    /* Animated background particles */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(246, 135, 18, 0.6);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(246, 135, 18, 0.4);
    }

    .particle:nth-child(even) {
      background: rgba(255, 107, 53, 0.5);
      animation-duration: 10s;
      animation-direction: reverse;
    }

    .particle:nth-child(3n) {
      background: rgba(255, 255, 255, 0.3);
      animation-duration: 12s;
      width: 2px;
      height: 2px;
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(0px) translateX(0px) rotate(0deg); 
        opacity: 0.3; 
      }
      25% { 
        transform: translateY(-30px) translateX(15px) rotate(90deg); 
        opacity: 0.7; 
      }
      50% { 
        transform: translateY(-60px) translateX(-10px) rotate(180deg); 
        opacity: 1; 
      }
      75% { 
        transform: translateY(-30px) translateX(-20px) rotate(270deg); 
        opacity: 0.6; 
      }
    }

    /* Additional animated elements */
    .bg-animation::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        conic-gradient(from 0deg at 70% 30%, transparent 0deg, rgba(246, 135, 18, 0.02) 60deg, transparent 120deg),
        conic-gradient(from 180deg at 30% 70%, transparent 0deg, rgba(255, 107, 53, 0.02) 60deg, transparent 120deg);
      animation: rotate 60s linear infinite;
    }

    .bg-animation::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 10% 10%, rgba(246, 135, 18, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(255, 107, 53, 0.03) 0%, transparent 50%);
      animation: pulse 20s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(1); }
      100% { opacity: 0.8; transform: scale(1.1); }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Control buttons */
    .control-buttons {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .control-btn {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      color: #fff;
      border: 2px solid rgba(246, 135, 18, 0.6);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn:hover {
      background: rgba(246, 135, 18, 0.2);
      border-color: rgba(246, 135, 18, 1);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(246, 135, 18, 0.3);
    }



    /* Navigation styling */
    .desktop-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 15px 20px;
      margin-bottom: 25px;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(246, 135, 18, 0.2);
    }

    .desktop-nav a {
      color: #ffffff;
      font-size: clamp(14px, 2vw, 18px);
      text-transform: uppercase;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      position: relative;
      overflow: hidden;
    }

    .desktop-nav a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(246, 135, 18, 0.2), transparent);
      transition: left 0.5s;
    }

    .desktop-nav a:hover::before {
      left: 100%;
    }

    .desktop-nav a:hover {
      background: rgba(246, 135, 18, 0.8);
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(246, 135, 18, 0.3);
      border-color: rgba(246, 135, 18, 1);
    }

    /* Main header container */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
      z-index: 1;
      padding: 20px;
      position: relative;
    }

    /* Logo styling */
    .logo {
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(246, 135, 18, 0.5));
      transition: all 0.4s ease;
    }

    .logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 30px rgba(246, 135, 18, 0.8));
    }

    .logo img {
      max-width: min(25vw, 300px);
      width: 100%;
      height: auto;
    }

    /* Title styling */
    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 3px;
      margin: 0.2em 0 0;
      background: linear-gradient(45deg, #f68712, #ff6b35, #f68712);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(246, 135, 18, 0.3));
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    h2 {
      font-size: clamp(1.2rem, 4vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      margin: 10px 0 40px;
      opacity: 0.9;
      font-weight: 300;
    }

    /* Social media styling */
    .socials {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin-top: 15px;
      margin-bottom: 30px;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      border: 2px solid rgba(246, 135, 18, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
    }

    .socials a:hover {
      background: rgba(246, 135, 18, 0.2);
      border-color: rgba(246, 135, 18, 1);
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 10px 25px rgba(246, 135, 18, 0.4);
    }

    .socials svg {
      width: 24px;
      height: 24px;
      fill: #ffffff;
      transition: fill 0.3s ease;
    }

    .socials a:hover svg {
      fill: #f68712;
    }

    /* Copyright styling */
    .copyright {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .control-buttons {
        flex-direction: column;
        gap: 5px;
        top: 15px;
        right: 15px;
      }
      

      
      header {
        padding: 60px 20px 20px;
      }
      
      .logo img {
        max-width: 50vw;
      }
      
      .desktop-nav {
        flex-direction: column;
        gap: 10px;
        padding: 15px;
        margin-bottom: 15px;
      }
      
      .desktop-nav a {
        font-size: 14px;
        padding: 10px 16px;
        text-align: center;
      }
      
      .socials {
        gap: 20px;
        margin-top: 10px;
      }
      
      .socials a {
        width: 50px;
        height: 50px;
      }
      
      .socials svg {
        width: 20px;
        height: 20px;
      }
    }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { 
        opacity: 0;
        transform: translateY(30px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Staggered animations */
    .logo { animation-delay: 0.2s; }
    h1 { animation-delay: 0.4s; }
    h2 { animation-delay: 0.6s; }
    .desktop-nav { animation-delay: 0.8s; }
    .socials { animation-delay: 1s; }
  </style>
</head>
<body class="fade-in" style="opacity: 0; transition: opacity 1.5s ease-in;">

  <script>
    // Initialize page
    window.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = '1';
      createParticles();
    });

    // Video toggle functionality
    function toggleVideo() {
      const video = document.getElementById('bgVideo');
      if (video.classList.contains('hide-video')) {
        video.classList.remove('hide-video');
        video.play().catch(e => console.log('Video play failed:', e));
      } else {
        video.classList.add('hide-video');
        video.pause();
      }
    }

    // Particle animation toggle
    function toggleParticles() {
      const bgAnimation = document.getElementById('bgAnimation');
      if (bgAnimation.style.display === 'none') {
        bgAnimation.style.display = 'block';
        bgAnimation.style.opacity = '1';
      } else {
        bgAnimation.style.display = 'none';
      }
    }

    // Background particles
    function createParticles() {
      const bgAnimation = document.getElementById('bgAnimation');
      const particleCount = 60;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
        
        // Add variety to particle sizes and colors
        if (Math.random() > 0.7) {
          particle.style.width = '6px';
          particle.style.height = '6px';
          particle.style.background = 'rgba(255, 255, 255, 0.4)';
        }
        
        bgAnimation.appendChild(particle);
      }
    }



    // Enhanced hover effects for social icons
    document.querySelectorAll('.socials a').forEach(link => {
      link.addEventListener('mouseenter', function() {
        this.style.transform = 'translateY(-8px) scale(1.15) rotate(5deg)';
      });
      
      link.addEventListener('mouseleave', function() {
        this.style.transform = 'translateY(0) scale(1) rotate(0deg)';
      });
    });

    // Smooth scroll for any internal links (if added later)
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // Add some sparkle effect on logo hover
    document.querySelector('.logo').addEventListener('mouseenter', function() {
      this.style.transform = 'scale(1.08) rotate(2deg)';
    });

    document.querySelector('.logo').addEventListener('mouseleave', function() {
      this.style.transform = 'scale(1) rotate(0deg)';
    });
  </script>
